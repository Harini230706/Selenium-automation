<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Calculator</title>

<style>
body{
font-family: Arial;
margin:50px;
}

input{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:8px 16px;
margin:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
color:green;
}
</style>

</head>

<body>

<h2>Simple Calculator</h2>

<input type="number" id="num1" placeholder="Enter first number">

<input type="number" id="num2" placeholder="Enter second number">

<br>

<button id="addBtn" onclick="calculate('add')">
Add
</button>

<button id="subBtn" onclick="calculate('subtract')">
Subtract
</button>

<p id="result">
Result:
</p>

<script>

function calculate(operation)
{

const a=parseFloat(document.getElementById('num1').value);

const b=parseFloat(document.getElementById('num2').value);

let result;

if(operation==='add')
result=a+b;

else if(operation==='subtract')
result=a-b;

document.getElementById('result').innerText=
'Result: '+result;

}

</script>

</body>
</html>
